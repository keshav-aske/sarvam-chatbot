spring.application.name=sarvam-chatbot

server.port=${PORT:8081}

spring.datasource.url=jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5433}/${DB_NAME:sarvam_chatbot}
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:postgres}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.jdbc.time_zone=UTC

app.cors.allowed-origins=${FRONTEND_URL:http://localhost:4200}

sarvam.api.base-url=https://api.sarvam.ai
sarvam.api.key=${SARVAM_API_KEY:}
sarvam.api.model=sarvam-m
sarvam.api.temperature=0.7
sarvam.api.max-tokens=1024
