<div class="layout">
  <aside class="sidebar">
    <button class="new-btn" (click)="newChat()">+ New chat</button>
    <ul class="conv-list">
      <li
        *ngFor="let c of conversations"
        [class.active]="c.id === conversationId"
        (click)="openConversation(c.id)"
      >
        <span class="conv-title">{{ c.title }}</span>
        <button class="del-btn" (click)="deleteConversation(c.id, $event)" title="Delete">×</button>
      </li>
    </ul>
  </aside>

  <main class="chat">
    <header class="chat-header">
      <h1>Sarvam Chatbot</h1>
    </header>

    <div class="messages">
      <div *ngIf="messages.length === 0" class="empty">
        Start a conversation. Powered by Sarvam AI.
      </div>

      <div *ngFor="let m of messages" class="msg" [class.user]="m.role === 'user'" [class.assistant]="m.role === 'assistant'">
        <div class="bubble">{{ m.content }}</div>
      </div>

      <div *ngIf="sending" class="msg assistant">
        <div class="bubble typing">…</div>
      </div>

      <div #scrollAnchor></div>
    </div>

    <div *ngIf="error" class="error">{{ error }}</div>

    <div class="composer">
      <textarea
        [(ngModel)]="input"
        (keydown)="onKeydown($event)"
        placeholder="Type a message and press Enter…"
        rows="2"
        [disabled]="sending"
      ></textarea>
      <button (click)="send()" [disabled]="sending || !input.trim()">Send</button>
    </div>
  </main>
</div>
